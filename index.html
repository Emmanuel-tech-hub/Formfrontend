<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Dwelling Place</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serifDisplay: ['Playfair Display', 'serif'],
            bodySans: ['Montserrat', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    body {
      background: #080808;
    }

    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .choice-btn:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
      transition: all 0.3s ease;
    }

    input {
      background: transparent;
    }

    input:focus {
      outline: none;
    }
  </style>
</head>

<body class="text-white font-bodySans min-h-screen flex items-center justify-center px-6">

  <div class="w-full max-w-2xl text-center">

    <!-- Hero -->
    <div id="hero" class="fade-up">
      <h1 class="font-serifDisplay text-4xl md:text-5xl mb-4 tracking-wide">
        The Dwelling Place
      </h1>
      <p class="text-gray-400 text-lg mb-12">
        A space to belong. A place to be known. Welcome home.
      </p>

      <div id="choice-section" class="space-y-4">
        <button onclick="selectType('First-Time Visitor')" 
          class="choice-btn glass w-full py-4 rounded-full text-sm tracking-wide transition duration-300">
          I am visiting for the first time
        </button>

        <button onclick="selectType('Returning Member')" 
          class="choice-btn glass w-full py-4 rounded-full text-sm tracking-wide transition duration-300">
          I am a returning member
        </button>
      </div>
    </div>

    <!-- Form -->
    <div id="form-section" class="hidden mt-12 fade-up">
      <form class="space-y-10 text-left">

        <div>
          <label class="text-gray-400 text-sm">Full Name</label>
          <input type="text" id="fullName" required
            class="w-full border-b border-gray-600 py-2 text-white placeholder-gray-500 focus:border-white transition duration-300"
            placeholder="Your name" />
        </div>

        <div>
          <label class="text-gray-400 text-sm">Phone Number</label>
          <input type="tel" id="phone" required
            class="w-full border-b border-gray-600 py-2 text-white placeholder-gray-500 focus:border-white transition duration-300"
            placeholder="+233..." />
        </div>

        <div>
          <label class="text-gray-400 text-sm">Location</label>
          <input type="text" id="location" required
            class="w-full border-b border-gray-600 py-2 text-white placeholder-gray-500 focus:border-white transition duration-300"
            placeholder="City / Area" />
        </div>

        <button type="button"
          class="mt-8 w-full glass py-4 rounded-full text-sm tracking-wide hover:bg-white/10 transition duration-300">
          Connect with us
        </button>

      </form>
    </div>

  </div>

  <script>
    let memberType = "";

    function selectType(type) {
      memberType = type;
      document.getElementById("choice-section").classList.add("hidden");
      document.getElementById("form-section").classList.remove("hidden");
    }
  </script>

</body>
</html>
